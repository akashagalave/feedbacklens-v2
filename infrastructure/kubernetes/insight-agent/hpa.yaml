apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: insight-agent-hpa
  namespace: feedbacklens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: insight-agent
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70