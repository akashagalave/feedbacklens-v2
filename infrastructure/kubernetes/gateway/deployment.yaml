apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: feedbacklens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/feedbacklens-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: feedbacklens-secrets
          env:
            - name: ORCHESTRATOR_URL  #Gateway ko pata hai kisko call karna hai
              value: "http://orchestrator:8001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"