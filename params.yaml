  eval_path: data/eval/ground_truth.json

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 64

qdrant:
  host: https://ce4ff150-3c44-46e7-b298-5299502f83a9.us-east-1-1.aws.cloud.qdrant.io
  port: 6333
  collection_name: feedbacklens
