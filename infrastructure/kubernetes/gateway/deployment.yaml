apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: feedbacklens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: gateway
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/feedbacklens-gateway:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: feedbacklens-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10