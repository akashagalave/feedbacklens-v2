apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-agent
  namespace: feedbacklens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-agent
  template:
    metadata:
      labels:
        app: recommendation-agent
    spec:
      containers:
        - name: recommendation-agent
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/feedbacklens-recommendation-agent:latest
          ports:
            - containerPort: 8004
          envFrom:
            - secretRef:
                name: feedbacklens-secrets
          env:
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_PROJECT
              value: "feedbacklens-v2"
            - name: LANGSMITH_ENDPOINT
              value: "https://api.smith.langchain.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10