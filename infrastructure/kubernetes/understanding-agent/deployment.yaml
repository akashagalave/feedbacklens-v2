apiVersion: apps/v1
kind: Deployment
metadata:
  name: understanding-agent
  namespace: feedbacklens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: understanding-agent
  template:
    metadata:
      labels:
        app: understanding-agent
    spec:
      containers:
        - name: understanding-agent
          image: 618015514032.dkr.ecr.us-east-1.amazonaws.com/feedbacklens-understanding-agent:latest
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: feedbacklens-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"